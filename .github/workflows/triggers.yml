name: Triggers Demo

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'package*.json'
      - '.github/workflows/**'
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production, development ]
      debug:
        description: 'Enable verbose logging'
        required: false
        type: boolean
        default: false
      message:
        description: 'Custom run message'
        required: false
        type: string
        default: 'Manual run'
  schedule:
    - cron: '*/15 * * * *'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show event details
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Scheduled run context
        if: github.event_name == 'schedule'
        run: |
          echo "Cron fired at $(date -u)"
