name: Triggers Demo

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'package*.json'
      - '.github/workflows/**'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show event details
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "SHA: ${{ github.sha }}"
